name: Backend CI

on:
  pull_request:
    paths:
      - "system/backend/**"
      - "system/frontend/**"
      - "test-contracts/api/**"
      - "test-contracts/frontend/**"
      - "testbed/**"
      - "docs/api/openapi.yaml"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: system/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "system/frontend/package-lock.json"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Install frontend
        working-directory: system/frontend
        run: npm ci
      - name: Django checks
        env:
          DJANGO_DEBUG: "false"
          DJANGO_SECRET_KEY: "ci-secret-key-with-more-than-fifty-characters-1234567890"
          DJANGO_ALLOWED_HOSTS: "testserver,localhost"
          API_AUTH_TOKEN: "ci-api-token"
          AGENT_BOOTSTRAP_TOKEN: "ci-bootstrap-token"
        run: |
          python manage.py check --deploy
          python manage.py makemigrations --check --dry-run
      - name: Tests
        run: pytest
      - name: Frontend checks
        working-directory: system/frontend
        run: |
          npm run typecheck
          npm test
          npm run build
      - name: Testbed compose checks
        working-directory: ${{ github.workspace }}
        env:
          BOOTSTRAP_TOKEN: "ci-bootstrap-token"
          POSTGRES_PASSWORD: "ci-testbed-db-password"
          IPSEC_PSK: "ci-ipsec-psk"
        run: |
          testbed/scripts/validate.sh
