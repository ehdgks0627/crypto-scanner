name: Backend CI

on:
  pull_request:
    paths:
      - "system/backend/**"
      - "test-contracts/api/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: system/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Django checks
        env:
          DJANGO_DEBUG: "false"
          DJANGO_SECRET_KEY: "ci-secret-key-with-more-than-fifty-characters-1234567890"
          DJANGO_ALLOWED_HOSTS: "testserver,localhost"
        run: |
          python manage.py check --deploy
          python manage.py makemigrations --check --dry-run
      - name: Tests
        run: pytest
