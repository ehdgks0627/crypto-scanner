events {}

http {
  server {
    listen 443 ssl http2;
    server_name web.testbed.local web-ec.testbed.local;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_certificate /etc/testbed/certs/web/server.crt;
    ssl_certificate_key /etc/testbed/certs/web/server.key;
    ssl_certificate /etc/testbed/certs/web-ec/server.crt;
    ssl_certificate_key /etc/testbed/certs/web-ec/server.key;

    location / {
      root /usr/share/nginx/html;
      index index.html;
    }
  }
}
