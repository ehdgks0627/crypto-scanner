events {}

http {
  server {
    listen 443 ssl;
    server_name pqc-tls.testbed.local;

    ssl_protocols TLSv1.3;
    ssl_certificate /etc/testbed/certs/pqc-tls/server.crt;
    ssl_certificate_key /etc/testbed/certs/pqc-tls/server.key;

    location = /.well-known/pqc-readiness.json {
      default_type application/json;
      add_header Cache-Control "no-store";
      return 200 '{"pqc_enabled":true,"standard":"NIST FIPS 203/204","implementation":"testbed-reference","signature_algorithm":"ML-DSA-65","kem_group":"ML-KEM-768","hybrid_group":"X25519MLKEM768","evidence_path":"/.well-known/pqc-readiness.json"}';
    }

    location / {
      return 200 "pqc-tls.testbed.local PQC reference endpoint\n";
      add_header Content-Type text/plain;
    }
  }
}
