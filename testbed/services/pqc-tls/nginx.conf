events {}

http {
  server {
    listen 443 ssl;
    server_name pqc-tls.testbed.local;

    ssl_protocols TLSv1.3;
    ssl_certificate /etc/testbed/certs/pqc-tls/server.crt;
    ssl_certificate_key /etc/testbed/certs/pqc-tls/server.key;

    location / {
      return 200 "pqc-tls.testbed.local placeholder endpoint\n";
      add_header Content-Type text/plain;
    }
  }
}
