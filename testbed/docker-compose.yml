name: crypto-scanner-testbed

x-host-gateway: &host-gateway
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-agent-env: &agent-env
  BACKEND_URL: ${BACKEND_URL:-http://host.docker.internal:8000}
  BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:?Set BOOTSTRAP_TOKEN in testbed/.env. It must match system AGENT_BOOTSTRAP_TOKEN.}
  AGENT_LISTEN: ${AGENT_LISTEN:-0.0.0.0:9100}
  AGENT_LOG_LEVEL: ${AGENT_LOG_LEVEL:-INFO}

x-service-hardening: &service-hardening
  security_opt:
    - no-new-privileges:true

x-tls-fixture-base: &tls-fixture-base
  image: nginx:1.27.3-alpine
  volumes:
    - ./services/tls-fixture/default.conf.template:/etc/nginx/templates/default.conf.template:ro
  depends_on:
    certgen:
      condition: service_completed_successfully
    dns:
      condition: service_started

x-agent-sidecar-base: &agent-sidecar-base
  build:
    context: .
    dockerfile: agent/Dockerfile
  command: ["python", "/opt/testbed-agent/mock_agent.py"]
  volumes:
    - ./agent:/opt/testbed-agent:ro
  depends_on:
    certgen:
      condition: service_completed_successfully
    dns:
      condition: service_started

services:
  certgen:
    build:
      context: .
      dockerfile: services/certgen/Dockerfile
    command: ["/bin/sh", "-c", "testbed-check-env && /certs/generate.sh"]
    environment:
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:?Set BOOTSTRAP_TOKEN in testbed/.env. It must match system AGENT_BOOTSTRAP_TOKEN.}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in testbed/.env.}
      IPSEC_PSK: ${IPSEC_PSK:?Set IPSEC_PSK in testbed/.env.}
      CERT_VALIDITY_DAYS: ${CERT_VALIDITY_DAYS:-365}
      CERT_NEAR_EXPIRY_DAYS: ${CERT_NEAR_EXPIRY_DAYS:-15}
      FORCE_CERT_REGEN: ${FORCE_CERT_REGEN:-0}
    volumes:
      - ./certs:/certs

  dns:
    build:
      context: .
      dockerfile: services/dns/Dockerfile
    command: ["--conf-file=/etc/dnsmasq.conf", "--no-daemon"]
    volumes:
      - ./dns/dnsmasq.conf:/etc/dnsmasq.conf:ro
    ports:
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${DNS_PORT_HOST:-5353}:53/udp"
    networks:
      pqc-testbed-net:
        ipv4_address: 172.31.240.2
    <<: *service-hardening

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    environment:
      <<: *agent-env
      AGENT_HOSTNAME: web.testbed.local
      AGENT_CAPABILITIES: agent.cert_store,agent.pkg_keyring,agent.app_cert_files,agent.app_config
      AGENT_URL: http://${AGENT_PUBLIC_HOST:-127.0.0.1}:${WEB_AGENT_PORT:-9101}
    volumes:
      - ./certs/web:/etc/testbed/certs/web:ro
      - ./certs/web-ec:/etc/testbed/certs/web-ec:ro
    ports:
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${WEB_HTTPS_PORT:-4430}:443"
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${WEB_AGENT_PORT:-9101}:9100"
    depends_on:
      certgen:
        condition: service_completed_successfully
      dns:
        condition: service_started
    networks:
      pqc-testbed-net:
        ipv4_address: 172.31.240.10
    <<: [*host-gateway, *service-hardening]

  pqc-tls:
    image: nginx:1.27.3-alpine
    labels:
      crypto-scanner.testbed.known-answer: "false"
      crypto-scanner.testbed.note: "Placeholder until OQS-provider image is added."
    volumes:
      - ./services/pqc-tls/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/pqc-tls:/etc/testbed/certs/pqc-tls:ro
    ports:
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${PQC_TLS_PORT:-4431}:443"
    depends_on:
      certgen:
        condition: service_completed_successfully
      dns:
        condition: service_started
    networks:
      pqc-testbed-net:
        ipv4_address: 172.31.240.11
    <<: *service-hardening

  ssh:
    build:
      context: .
      dockerfile: services/ssh/Dockerfile
    environment:
      <<: *agent-env
      AGENT_HOSTNAME: ssh.testbed.local
      AGENT_CAPABILITIES: agent.ssh_userkey,agent.ssh_config,agent.cert_store
      AGENT_URL: http://${AGENT_PUBLIC_HOST:-127.0.0.1}:${SSH_AGENT_PORT:-9102}
    ports:
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${SSH_PORT:-2222}:22"
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${SSH_AGENT_PORT:-9102}:9100"
    depends_on:
      certgen:
        condition: service_completed_successfully
      dns:
        condition: service_started
    networks:
      pqc-testbed-net:
        ipv4_address: 172.31.240.12
    <<: [*host-gateway, *service-hardening]

  mqtt:
    image: eclipse-mosquitto:2.0.18
    user: "0:0"
    volumes:
      - ./services/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./certs/mqtt:/mosquitto/certs/mqtt:ro
    ports:
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${MQTT_TLS_PORT:-8883}:8883"
    depends_on:
      certgen:
        condition: service_completed_successfully
      dns:
        condition: service_started
    networks:
      pqc-testbed-net:
        ipv4_address: 172.31.240.13
    <<: *service-hardening

  ipsec:
    build:
      context: .
      dockerfile: services/ipsec/Dockerfile
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
    environment:
      IPSEC_PSK: ${IPSEC_PSK:?Set IPSEC_PSK in testbed/.env.}
    volumes:
      - ./services/ipsec/swanctl.conf:/etc/swanctl/swanctl.conf.template:ro
      - ./certs/ipsec:/etc/swanctl/x509:ro
    ports:
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${IPSEC_IKE_PORT:-5000}:500/udp"
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${IPSEC_NATT_PORT:-45000}:4500/udp"
    depends_on:
      certgen:
        condition: service_completed_successfully
      dns:
        condition: service_started
    networks:
      pqc-testbed-net:
        ipv4_address: 172.31.240.14
    <<: *service-hardening

  mail:
    build:
      context: .
      dockerfile: services/mail/Dockerfile
    environment:
      MAIL_HOSTNAME: mail.testbed.local
    volumes:
      - ./certs/mail:/etc/testbed/certs/mail:ro
      - ./certs/mail-imaps:/etc/testbed/certs/mail-imaps:ro
    ports:
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${MAIL_SMTP_PORT:-2525}:25"
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${MAIL_SMTPS_PORT:-4465}:465"
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${MAIL_SUBMISSION_PORT:-5587}:587"
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${MAIL_IMAPS_PORT:-9993}:993"
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${MAIL_POP3S_PORT:-9995}:995"
    depends_on:
      certgen:
        condition: service_completed_successfully
      dns:
        condition: service_started
    networks:
      pqc-testbed-net:
        ipv4_address: 172.31.240.15
    <<: *service-hardening

  db:
    build:
      context: .
      dockerfile: services/db/Dockerfile
    environment:
      <<: *agent-env
      POSTGRES_DB: ${POSTGRES_DB:-pqc_testbed}
      POSTGRES_USER: ${POSTGRES_USER:-pqc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in testbed/.env.}
      AGENT_HOSTNAME: db.testbed.local
      AGENT_CAPABILITIES: agent.cert_store,agent.keystore,agent.app_cert_files,agent.app_config
      AGENT_URL: http://${AGENT_PUBLIC_HOST:-127.0.0.1}:${DB_AGENT_PORT:-9103}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./certs/db:/etc/testbed/db-certs:ro
      - ./services/db/postgresql.conf:/etc/testbed/postgresql.conf:ro
      - ./services/db/pg_hba.conf:/etc/testbed/pg_hba.conf:ro
    ports:
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${DB_PORT:-54320}:5432"
      - "${TESTBED_BIND_ADDR:-127.0.0.1}:${DB_AGENT_PORT:-9103}:9100"
    depends_on:
      certgen:
        condition: service_completed_successfully
      dns:
        condition: service_started
    networks:
      pqc-testbed-net:
        ipv4_address: 172.31.240.16
    <<: [*host-gateway, *service-hardening]

  api-gateway:
    <<: [*tls-fixture-base, *service-hardening]
    environment:
      SERVICE_HOSTNAME: api-gateway.testbed.local
      SERVICE_KIND: api-gateway
      SERVICE_PORT: 8443
      TLS_PROTOCOLS: TLSv1.2 TLSv1.3
    volumes:
      - ./services/tls-fixture/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./certs/api-gateway:/etc/testbed/certs/service:ro
    networks:
