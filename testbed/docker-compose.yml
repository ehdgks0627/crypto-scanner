      AGENT_CERT_STORE_PATHS: /etc/api-gateway/trust
      AGENT_APP_CONFIG_PATHS: /etc/api-gateway/jwks/current.json
    volumes:
      - ./agent:/opt/testbed-agent:ro
      - ./certs/api-gateway/ca.crt:/etc/api-gateway/trust/internal-ca.pem:ro
