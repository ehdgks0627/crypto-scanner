    get:
      tags: [Performance]
      summary: List performance history for one asset row
      operationId: listAssetPerformanceHistory
      parameters:
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Asset performance history
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetPerformanceResultPage'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /agents/register:
    post:
      tags: [Agents]
      summary: Register an agent
      operationId: registerAgent
      security:
        - BootstrapToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRegister'
            examples:
              default:
                externalValue: ./examples/agent-register.json
      responses:
        '201':
          description: Agent registered for a new hostname. Returns a raw token once.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRegisterResult'
              examples:
                created:
                  externalValue: ./examples/agent-register-result-created.json
        '200':
          description: Existing hostname re-registered. Agent metadata is updated and token is rotated.
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRegisterResult'
              examples:
                token_rotated:
                  externalValue: ./examples/agent-register-result-rotated.json
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/InvalidToken'
        '422':
          $ref: '#/components/responses/Unprocessable'
        default:
          $ref: '#/components/responses/Error'

  /agents:
    get:
      tags: [Agents]
      summary: List agents
      operationId: listAgents
      parameters:
        - name: active
          in: query
          schema:
            type: boolean
        - name: agent_role
          in: query
          schema:
            $ref: '#/components/schemas/AgentRole'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Agent list
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPage'
              examples:
                default:
                  externalValue: ./examples/agents-list.json
        '400':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /agents/{id}:
    parameters:
      - $ref: '#/components/parameters/Uuid'
    get:
      tags: [Agents]
      summary: Get agent details
      operationId: getAgent
      responses:
        '200':
          description: Agent details
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Agents]
      summary: Deactivate an agent
      operationId: deleteAgent
      responses:
        '204':
          description: Deactivated
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /agents/{id}/heartbeat:
    parameters:
      - $ref: '#/components/parameters/Uuid'
    post:
      tags: [Agents]
      summary: Record agent heartbeat
      operationId: heartbeatAgent
      security:
