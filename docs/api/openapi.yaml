      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentHeartbeat'
            examples:
              default:
                externalValue: ./examples/agent-heartbeat.json
      responses:
        '200':
          description: Heartbeat accepted
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentHeartbeatResult'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/InvalidToken'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        default:
          $ref: '#/components/responses/Error'

  /health:
    get:
      tags: [Health]
      summary: Get API and dependency health
      operationId: getHealth
      responses:
        '200':
          description: API and dependency health status
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                default:
                  externalValue: ./examples/health-ok.json
                degraded:
                  externalValue: ./examples/health-degraded.json
        '400':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Get dashboard summary
      operationId: getDashboardSummary
      parameters:
        - name: snapshot_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Dashboard summary
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
              examples:
                default:
                  externalValue: ./examples/dashboard-summary.json
                empty:
                  externalValue: ./examples/dashboard-empty.json
        '400':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /meta/protocols:
    get:
      tags: [Meta]
      summary: List supported protocol hints
      operationId: getMetaProtocols
      responses:
        '200':
          description: Supported protocols
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/StaticCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtocolMeta'
              examples:
                default:
                  externalValue: ./examples/meta-protocols.json
        '400':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /meta/scanners:
    get:
      tags: [Meta]
      summary: List supported scanners
      operationId: getMetaScanners
      responses:
        '200':
          description: Supported scanners
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/StaticCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScannerMeta'
              examples:
                default:
                  externalValue: ./examples/meta-scanners.json
        '400':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /meta/algorithm-risk-table:
    get:
      tags: [Meta]
      summary: Get algorithm risk table
      operationId: getAlgorithmRiskTable
      responses:
        '200':
          description: Algorithm risk table
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/StaticCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlgorithmRiskTable'
              examples:
                default:
                  externalValue: ./examples/algorithm-risk-table.json
        '400':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

components:
  securitySchemes:
    ApiToken:
      type: apiKey
      in: header
      name: X-API-Token
    BootstrapToken:
      type: apiKey
      in: header
      name: X-Bootstrap-Token
    AgentBearer:
      type: http
      scheme: bearer

  headers:
    XRequestId:
      description: Request trace id. If the client sends `X-Request-Id`, the server echoes it.
      schema:
        type: string
        format: uuid
    NoStore:
      description: Polling responses are not cacheable.
      schema:
        type: string
      example: no-store
    StaticCache:
      description: Static metadata can be cached briefly.
      schema:
        type: string
      example: max-age=600
    ContentDisposition:
      description: Download filename for exported files.
      schema:
        type: string
      example: attachment; filename="cbom-56.json"

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    Uuid:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SnapshotId:
      name: sid
      in: path
      required: true
      schema:
        type: integer
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Sort:
      name: sort
      in: query
      description: Field name, prefixed with `-` for descending order.
      schema:
        type: string
    HostFilter:
      name: host
      in: query
      schema:
        type: string
    ProtocolHintFilter:
      name: protocol_hint
      in: query
      schema:
        $ref: '#/components/schemas/ProtocolHint'
    AgentEnabledFilter:
      name: agent_enabled
      in: query
      schema:
        type: boolean

  responses:
    Error:
      description: Error response
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validation:
              externalValue: ./examples/error-validation.json
    NotFound:
      description: Resource not found
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    JobNotCancellable:
      description: Job cannot be cancelled in its current state or by kind policy.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            job_not_cancellable:
              externalValue: ./examples/error-job-not-cancellable.json
    InvalidToken:
      description: Invalid or missing token
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unprocessable:
      description: Request is semantically invalid
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Required backend dependency is unavailable.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/XRequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ProtocolHint:
      type: string
      enum: [TLS, SSH, IKE, SMTP, IMAP, POP3, UNKNOWN]
    DetectedProtocol:
      type: string
      enum: [HTTPS, TLS, SSH, IKE, SMTP, SMTPS, IMAP, IMAPS, POP3, POP3S, MQTT, PostgreSQL, UNKNOWN]
    Transport:
      type: string
      enum: [TCP, UDP]
    Sensitivity:
      type: string
      enum: [low, medium, high, critical]
    Criticality:
      type: string
      enum: [low, medium, high, critical]
    Exposure:
      type: string
      enum: [public_internet, dmz, internal_network, air_gapped]
    JobStatus:
      type: string
      enum: [PENDING, RUNNING, COMPLETED, FAILED, CANCELLED]
    JobKind:
      type: string
      enum: [scan_job, discovery, recompute]
    RunStatus:
      type: string
      enum: [SUCCESS, PARTIAL, TIMEOUT, UNREACHABLE, ERROR, SKIPPED]
    RiskTier:
      type: string
      enum: [CRITICAL, HIGH, MEDIUM, LOW]
    AssetClass:
      type: string
      enum: [crypto, host, service, data]
    AssetType:
      type: string
      enum: [algorithm, certificate, key, protocol, keystore, device, service, data]
    ScannerId:
      type: string
      enum:
        - network
        - agent.cert_store
        - agent.pkg_keyring
        - agent.ssh_userkey
        - agent.ssh_config
        - agent.keystore
        - agent.app_cert_files
        - agent.private_key_files
        - agent.app_config

    ErrorResponse:
      type: object
      required: [error, message, details]
      properties:
        error:
          type: string
          example: validation_error
        message:
          type: string
        details:
          type: object
          description: Machine-readable error details. Empty object when there are no details.
          additionalProperties: true

    TargetContext:
      type: object
      properties:
        sensitivity:
          type: string
          allOf:
            - $ref: '#/components/schemas/Sensitivity'
          nullable: true
        lifespan_years:
          type: integer
          minimum: 0
          nullable: true
        criticality:
          type: string
          allOf:
            - $ref: '#/components/schemas/Criticality'
          nullable: true
        exposure:
          type: string
          allOf:
            - $ref: '#/components/schemas/Exposure'
          nullable: true
        service_role:
          type: string
          nullable: true

    ContextSource:
      type: string
      enum: [asset_override, target, heuristic]

    AssetContextValues:
      type: object
      required: [sensitivity, lifespan_years, criticality, exposure, service_role]
      properties:
        sensitivity:
          type: string
          allOf:
            - $ref: '#/components/schemas/Sensitivity'
          nullable: true
        lifespan_years:
          type: integer
          minimum: 0
          nullable: true
        criticality:
          type: string
          allOf:
            - $ref: '#/components/schemas/Criticality'
          nullable: true
        exposure:
          type: string
          allOf:
            - $ref: '#/components/schemas/Exposure'
          nullable: true
        service_role:
          type: string
          nullable: true

    AssetContextSources:
      type: object
      required: [sensitivity, lifespan_years, criticality, exposure, service_role]
      properties:
        sensitivity:
          $ref: '#/components/schemas/ContextSource'
        lifespan_years:
          $ref: '#/components/schemas/ContextSource'
        criticality:
          $ref: '#/components/schemas/ContextSource'
        exposure:
          $ref: '#/components/schemas/ContextSource'
        service_role:
          $ref: '#/components/schemas/ContextSource'

    Target:
      type: object
      required:
        - id
        - host
        - port
        - protocol_hint
        - transport
        - agent_enabled
        - context
        - created_at
        - updated_at
      properties:
        id:
          type: integer
        host:
          type: string
          maxLength: 253
        display_name:
          type: string
          maxLength: 120
          nullable: true
        ip:
          type: string
          nullable: true
        port:
          type: integer
          minimum: 1
          maximum: 65535
        protocol_hint:
          $ref: '#/components/schemas/ProtocolHint'
        sni:
          type: string
          maxLength: 253
          nullable: true
        transport:
          $ref: '#/components/schemas/Transport'
        agent_enabled:
          type: boolean
        agent_url:
          type: string
          format: uri
          nullable: true
        context:
          $ref: '#/components/schemas/TargetContext'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TargetCreate:
      type: object
      required: [host, port, protocol_hint]
      properties:
        host:
          type: string
          maxLength: 253
        display_name:
          type: string
          maxLength: 120
          nullable: true
        ip:
          type: string
          format: ip
          nullable: true
        port:
          type: integer
          minimum: 1
          maximum: 65535
        protocol_hint:
          $ref: '#/components/schemas/ProtocolHint'
        sni:
          type: string
          maxLength: 253
          nullable: true
        transport:
          allOf:
            - $ref: '#/components/schemas/Transport'
          description: Defaults to TCP when omitted.
        agent_enabled:
          type: boolean
          description: Defaults to false when omitted.
        agent_url:
          type: string
          format: uri
          nullable: true
        context:
          $ref: '#/components/schemas/TargetContext'

    TargetPatch:
      type: object
      properties:
        host:
          type: string
          maxLength: 253
        display_name:
          type: string
          maxLength: 120
          nullable: true
        ip:
          type: string
          format: ip
          nullable: true
        port:
          type: integer
          minimum: 1
          maximum: 65535
        protocol_hint:
          $ref: '#/components/schemas/ProtocolHint'
        sni:
          type: string
          maxLength: 253
          nullable: true
        transport:
          $ref: '#/components/schemas/Transport'
        agent_enabled:
          type: boolean
        agent_url:
          type: string
          format: uri
          nullable: true
        context:
          $ref: '#/components/schemas/TargetContext'

    TargetPatchResult:
      type: object
      required: [target, recompute_job_id]
      properties:
        target:
          $ref: '#/components/schemas/Target'
        recompute_job_id:
          type: integer
          description: API-visible AsyncJob id to poll through GET /api/jobs/{id}.
          nullable: true

    TargetPage:
      allOf:
        - $ref: '#/components/schemas/PageBase'
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Target'

    PageBase:
      type: object
      required: [total, offset, limit]
      properties:
        total:
          type: integer
          minimum: 0
        offset:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1

