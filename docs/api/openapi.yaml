openapi: 3.0.3
info:
  title: Context-Aware PQC Risk Assessment API
  version: 0.1.0
  license:
    name: Internal Capstone Project
    url: https://github.com/ehdgks0627/crypto-scanner
  description: |
    API contract for the PQC Risk Assessment System.

    `docs/api/openapi.yaml` is the design source of truth. The Django Ninja
    implementation must expose an equivalent `/api/openapi.json`.
servers:
  - url: /api
security:
  - ApiToken: []
tags:
  - name: Targets
    description: Scan target registration and management.
  - name: Discovery
    description: CIDR discovery and endpoint promotion.
  - name: Jobs
    description: Asynchronous job lifecycle, polling, and logs.
  - name: Snapshots
    description: CBOM snapshot metadata, export, and diff.
  - name: Assets
    description: Snapshot asset inventory and asset detail views.
  - name: Risk
    description: Risk score retrieval, weights, and recomputation.
  - name: Migration
    description: PQC migration recommendations.
  - name: Performance
    description: PQC migration performance evaluation runs and asset-level measurements.
  - name: Agents
    description: Agent registration, listing, and heartbeat.
  - name: Health
    description: Backend dependency health for UI status indicators.
  - name: Dashboard
    description: Aggregated dashboard metrics.
  - name: Meta
    description: Static enums and reference tables.

paths:
  /targets:
    get:
      tags: [Targets]
      summary: List scan targets
      operationId: listTargets
      parameters:
        - $ref: '#/components/parameters/HostFilter'
        - $ref: '#/components/parameters/ProtocolHintFilter'
        - $ref: '#/components/parameters/AgentEnabledFilter'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Target list
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetPage'
              examples:
                default:
                  externalValue: ./examples/target-response.json
        '400':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Targets]
      summary: Create a scan target
      operationId: createTarget
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TargetCreate'
            examples:
              default:
                externalValue: ./examples/target-create.json
      responses:
        '201':
          description: Created target
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Target'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        default:
          $ref: '#/components/responses/Error'

  /targets/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Targets]
      summary: Get target details
      operationId: getTarget
      responses:
        '200':
          description: Target details
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Target'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [Targets]
      summary: Update target fields
      operationId: patchTarget
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TargetPatch'
      responses:
        '200':
          description: Updated target and optional recompute job id
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetPatchResult'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Targets]
      summary: Delete target
      operationId: deleteTarget
      responses:
        '204':
          description: Deleted
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /discoveries:
    get:
      tags: [Discovery]
      summary: List discovery jobs
      operationId: listDiscoveries
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/JobStatus'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Discovery list
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryPage'
        '400':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Discovery]
      summary: Start discovery
      operationId: createDiscovery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoveryCreate'
            examples:
              default:
                externalValue: ./examples/discovery-create.json
      responses:
        '202':
          description: Discovery job accepted
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobEnvelope'
              examples:
                accepted:
                  externalValue: ./examples/discovery-job-accepted.json
        '400':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        default:
          $ref: '#/components/responses/Error'

  /discoveries/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Discovery]
      summary: Get discovery status
      operationId: getDiscovery
      responses:
        '200':
          description: Discovery status
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Discovery'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        default:
          $ref: '#/components/responses/Error'

  /discoveries/{id}/endpoints:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Discovery]
      summary: List endpoints found by discovery
      operationId: listDiscoveredEndpoints
      parameters:
        - name: promoted
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Discovered endpoints
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveredEndpointPage'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /discoveries/{id}/promote:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Discovery]
      summary: Promote discovered endpoints to targets
      operationId: promoteDiscoveredEndpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoveryPromoteRequest'
      responses:
        '201':
          description: Promotion result
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryPromoteResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/Error'

  /jobs:
    get:
      tags: [Jobs]
      summary: List asynchronous jobs
      description: Lists API-visible asynchronous jobs. `POST /jobs` creates scan jobs; discovery and recompute jobs are created by their domain endpoints.
      operationId: listJobs
      parameters:
        - name: kind
          in: query
          schema:
            $ref: '#/components/schemas/JobKind'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/JobStatus'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Scan job list
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobEnvelopePage'
        '400':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Jobs]
      summary: Start a scan job
      operationId: createScanJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScanJobCreate'
            examples:
              default:
                externalValue: ./examples/job-create.json
      responses:
        '202':
          description: Scan job accepted
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobEnvelope'
              examples:
                accepted:
                  externalValue: ./examples/scan-job-accepted.json
        '400':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        default:
          $ref: '#/components/responses/Error'

  /jobs/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Jobs]
      summary: Get asynchronous job status
      operationId: getJob
      responses:
        '200':
          description: Scan job status
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobEnvelope'
              examples:
                running:
                  externalValue: ./examples/job-running.json
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /jobs/{id}/cancel:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Jobs]
      summary: Request cancellation for an async job
      operationId: cancelJob
      description: |
        Cancels pending/running scan and discovery jobs. Recompute jobs are cancellable only while PENDING.
        RUNNING scan/discovery jobs set cancel_requested_at and transition to CANCELLED when the worker observes the request.
      responses:
        '202':
          description: Cancellation request accepted
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/JobNotCancellable'
        default:
          $ref: '#/components/responses/Error'

  /jobs/{id}/logs:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Jobs]
      summary: List scan run logs
      operationId: listJobLogs
      parameters:
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Scan run logs
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanRunLogPage'
              examples:
                default:
                  externalValue: ./examples/job-logs.json
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /snapshots:
    get:
      tags: [Snapshots]
      summary: List CBOM snapshots
      operationId: listSnapshots
      parameters:
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Snapshot list
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CbomSnapshotPage'
              examples:
                default:
                  externalValue: ./examples/snapshot-list.json
        '400':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /snapshots/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Snapshots]
      summary: Get snapshot metadata
      operationId: getSnapshot
      responses:
        '200':
          description: Snapshot metadata
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CbomSnapshot'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /snapshots/{id}/export:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Snapshots]
      summary: Export snapshot as CycloneDX CBOM JSON
      operationId: exportSnapshot
      parameters:
        - name: pretty
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: CycloneDX CBOM JSON
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            Content-Disposition:
              $ref: '#/components/headers/ContentDisposition'
          content:
            application/vnd.cyclonedx+json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /snapshots/{id}/diff:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Snapshots]
      summary: Diff two snapshots
      operationId: diffSnapshots
      parameters:
        - name: other
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Snapshot diff
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CbomDiff'
              examples:
                default:
                  externalValue: ./examples/snapshot-diff.json
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /snapshots/{sid}/assets:
    parameters:
      - $ref: '#/components/parameters/SnapshotId'
    get:
      tags: [Assets]
      summary: List assets in a snapshot
      operationId: listAssets
      parameters:
        - name: asset_class
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/AssetClass'
        - name: asset_type
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/AssetType'
        - name: target_id
          in: query
          schema:
            type: integer
        - name: min_score
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - name: max_score
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - name: tier
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/RiskTier'
        - name: quantum_vulnerable
          in: query
          schema:
            type: boolean
        - name: q
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Asset inventory
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetListPage'
              examples:
                default:
                  externalValue: ./examples/asset-list.json
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /assets/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Assets]
      summary: Get asset details
      operationId: getAsset
      responses:
        '200':
          description: Asset details
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetDetail'
              examples:
                default:
                  externalValue: ./examples/asset-detail.json
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /assets/{id}/context:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [Assets]
      summary: Override asset context and enqueue risk recompute
      operationId: patchAssetContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetContextPatch'
            examples:
              default:
                externalValue: ./examples/asset-context-patch.json
      responses:
        '200':
          description: Applied overrides
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetContextPatchResult'
              examples:
                default:
                  externalValue: ./examples/asset-context-patch-result.json
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        default:
          $ref: '#/components/responses/Error'

  /assets/{id}/qualitative:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Assets]
      summary: Generate or refresh qualitative assessment
      operationId: createQualitativeAssessment
      responses:
        '200':
          description: Qualitative assessment
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualitativeAssessment'
              examples:
                default:
                  externalValue: ./examples/qualitative-response.json
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /snapshots/{sid}/risks:
    parameters:
      - $ref: '#/components/parameters/SnapshotId'
    get:
      tags: [Risk]
      summary: List risk scores for a snapshot
      operationId: listRisks
      parameters:
        - name: tier
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/RiskTier'
        - name: min_score
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - name: max_score
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Risk score list
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskScorePage'
              examples:
                default:
                  externalValue: ./examples/risk-list.json
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /snapshots/{sid}/risks/top:
    parameters:
      - $ref: '#/components/parameters/SnapshotId'
    get:
      tags: [Risk]
      summary: List top-N risk scores
      operationId: listTopRisks
      parameters:
        - name: n
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Top risks
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskScorePage'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /snapshots/{sid}/recompute:
    parameters:
      - $ref: '#/components/parameters/SnapshotId'
    post:
      tags: [Risk]
      summary: Recompute risk scores for a snapshot
      operationId: recomputeRisks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiskRecomputeRequest'
      responses:
        '202':
          description: Recompute job accepted
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobEnvelope'
              examples:
                accepted:
                  externalValue: ./examples/recompute-job-accepted.json
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        default:
          $ref: '#/components/responses/Error'

  /risk/weights:
    get:
      tags: [Risk]
      summary: Get default risk weights
      operationId: getRiskWeights
      responses:
        '200':
          description: Current default weights
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskWeightsState'
              examples:
                default:
                  externalValue: ./examples/risk-weights.json
        '400':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    put:
      tags: [Risk]
      summary: Update default risk weights
      operationId: putRiskWeights
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiskWeightsInput'
            examples:
              default:
                externalValue: ./examples/risk-weights-update.json
      responses:
        '200':
          description: Updated default weights
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskWeightsState'
              examples:
                default:
                  externalValue: ./examples/risk-weights.json
        '400':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Unprocessable'
        default:
          $ref: '#/components/responses/Error'

  /snapshots/{sid}/migration-plan:
    parameters:
      - $ref: '#/components/parameters/SnapshotId'
    get:
      tags: [Migration]
      summary: Get migration plan items for a snapshot
      operationId: getMigrationPlan
      parameters:
        - name: min_score
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - name: tier
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/RiskTier'
        - name: asset_type
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/AssetType'
        - name: target_id
          in: query
          schema:
            type: integer
        - name: asset_ids
          in: query
          description: Comma-separated asset ids to include.
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
            minItems: 1
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Migration plan
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationPlanPage'
              examples:
                default:
                  externalValue: ./examples/migration-plan.json
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        default:
          $ref: '#/components/responses/Error'

  /snapshots/{sid}/migration-plan/impact:
    parameters:
      - $ref: '#/components/parameters/SnapshotId'
    get:
      tags: [Migration]
      summary: Get migration impact analysis for selected assets
      operationId: getMigrationImpact
      parameters:
        - name: asset_ids
          in: query
          required: true
          description: Comma-separated asset ids.
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
            minItems: 1
      responses:
        '200':
          description: Migration impact analysis
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationImpact'
              examples:
                default:
                  externalValue: ./examples/migration-impact.json
        '400':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /snapshots/{sid}/performance-runs:
