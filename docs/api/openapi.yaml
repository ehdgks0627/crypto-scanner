        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [Performance]
      summary: Update performance run status
      operationId: patchPerformanceRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerformanceRunPatch'
      responses:
        '200':
          description: Updated performance run
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceEvaluationRun'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        default:
          $ref: '#/components/responses/Error'

  /snapshots/{sid}/performance-runs/{id}/results:
    parameters:
      - $ref: '#/components/parameters/SnapshotId'
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Performance]
      summary: Upsert an asset performance result in a run
      operationId: upsertPerformanceResult
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerformanceResultCreate'
      responses:
        '201':
          description: Created or updated asset performance result
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetPerformanceResult'
