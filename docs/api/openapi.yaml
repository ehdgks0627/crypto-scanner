      type: string
      enum: [central, agent]

    DiscoveryCreate:
      type: object
      required: [scope_type, scope_value]
      properties:
        scope_type:
          $ref: '#/components/schemas/DiscoveryScopeType'
        scope_value:
          type: string
          maxLength: 253
          example: app.example.com
        cidr:
          type: string
          maxLength: 253
          example: 172.31.240.0/24
          deprecated: true
          description: Legacy alias for CIDR-only clients. New clients should send scope_type and scope_value.
        executor_type:
          $ref: '#/components/schemas/DiscoveryExecutorType'
          description: Defaults to central when omitted. Use agent with agent_id to run from a Discovery Agent.
        agent_id:
          type: string
          format: uuid
          nullable: true
          description: Required when executor_type is agent.
        ports:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 65535
        include_default_ports:
          type: boolean
          description: Defaults to true when omitted.

    Discovery:
      type: object
      required: [id, job_id, scope_type, scope_value, cidr, executor_type, agent_id, agent_hostname, port_list, status, created_at, started_at]
      properties:
        id:
          type: integer
        job_id:
          type: integer
          description: API-visible AsyncJob id used for polling or cancellation.
        scope_type:
          $ref: '#/components/schemas/DiscoveryScopeType'
        scope_value:
          type: string
        cidr:
          type: string
        executor_type:
          $ref: '#/components/schemas/DiscoveryExecutorType'
        agent_id:
          type: string
          format: uuid
          nullable: true
        agent_hostname:
          type: string
          nullable: true
        port_list:
          type: array
          items:
            type: integer
        status:
          $ref: '#/components/schemas/JobStatus'
        progress:
          type: object
          allOf:
            - $ref: '#/components/schemas/JobProgress'
          nullable: true
        created_at:
          type: string
          format: date-time
          description: Discovery request creation time.
        started_at:
          type: string
          format: date-time
          nullable: true
          description: Worker execution start time. Null while status is PENDING.
        finished_at:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
        availability_report:
          $ref: '#/components/schemas/DiscoveryAvailabilityReport'

    DiscoveryPage:
      allOf:
        - $ref: '#/components/schemas/PageBase'
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Discovery'

    DiscoveredEndpoint:
      type: object
      required:
        - id
        - ip
        - port
        - banner_metadata
        - promoted
      properties:
        id:
          type: integer
        ip:
          type: string
          format: ip
        port:
          type: integer
          minimum: 1
          maximum: 65535
        detected_protocol:
          type: string
          allOf:
            - $ref: '#/components/schemas/DetectedProtocol'
          nullable: true
        banner_metadata:
          type: object
          additionalProperties: true
        promoted:
          type: boolean
        target_id:
          type: integer
          nullable: true
