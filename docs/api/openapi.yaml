      type: object
      description: Completed-job result only. PENDING and RUNNING jobs must return null for JobEnvelope.result.
      properties:
        snapshot_id:
          type: integer
          nullable: true
        discovery_id:
          type: integer
          nullable: true
        updated_scores_count:
          type: integer
          description: Number of RiskScore rows updated by a completed recompute job.
          nullable: true
        availability_report:
          $ref: '#/components/schemas/DiscoveryAvailabilityReport'
      additionalProperties: false

    JobEnvelope:
      type: object
      required: [id, kind, resource, status, progress, started_at, cancel_requested_at, finished_at, result, error]
      properties:
        id:
          type: integer
          description: API-visible asynchronous job id, unique across all job kinds.
        kind:
          $ref: '#/components/schemas/JobKind'
        resource:
          $ref: '#/components/schemas/JobResource'
        status:
          $ref: '#/components/schemas/JobStatus'
        progress:
          type: object
          allOf:
            - $ref: '#/components/schemas/JobProgress'
          nullable: true
          description: Always present. Null while PENDING or when no progress can be reported.
        started_at:
          type: string
          format: date-time
          nullable: true
        cancel_requested_at:
          type: string
          format: date-time
          nullable: true
          description: Set when cancellation has been requested but a running worker has not finished cleanup yet.
        finished_at:
          type: string
          format: date-time
          nullable: true
        result:
          type: object
          allOf:
            - $ref: '#/components/schemas/JobResult'
          nullable: true
          example:
