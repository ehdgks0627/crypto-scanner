      type: object
      description: Resource created by the job. For recompute, the AsyncJob itself is the resource and id equals JobEnvelope.id.
      required: [kind, id]
      properties:
        kind:
          $ref: '#/components/schemas/JobKind'
        id:
          type: integer
          description: Resource id for the job kind. For recompute this equals the API-visible job id.

