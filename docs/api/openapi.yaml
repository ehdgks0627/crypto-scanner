          application/json:
            schema:
              $ref: '#/components/schemas/PerformanceRunCreate'
      responses:
        '201':
          description: Created performance run
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceEvaluationRun'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        default:
          $ref: '#/components/responses/Error'

  /snapshots/{sid}/performance-runs/{id}:
    parameters:
      - $ref: '#/components/parameters/SnapshotId'
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Performance]
      summary: Get performance evaluation run detail
      operationId: getPerformanceRun
