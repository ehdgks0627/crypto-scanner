    AgentRole:
      type: string
      enum: [host, discovery]

    AgentRegister:
      type: object
      required: [hostname, capabilities]
      description: Uses X-Bootstrap-Token. New hostnames create an agent; existing hostnames update metadata and rotate the agent token.
      properties:
        hostname:
          type: string
          maxLength: 253
        agent_role:
          $ref: '#/components/schemas/AgentRole'
          description: Defaults to host when omitted. Discovery Agents can execute network discovery from their segment.
        agent_url:
          type: string
          format: uri
          nullable: true
        capabilities:
          type: array
          items:
            type: string
        os_distribution:
          type: string
          nullable: true

    AgentRegisterResult:
      type: object
      required: [id, agent_token, registration_action, token_rotated_at]
      properties:
        id:
          type: string
          format: uuid
        agent_token:
          type: string
          description: Raw token returned once at registration time.
        registration_action:
          type: string
          enum: [created, token_rotated]
        token_rotated_at:
          type: string
          format: date-time

    Agent:
      type: object
      required:
        - id
        - hostname
        - agent_role
        - agent_url
        - capabilities
        - registered_at
        - token_rotated_at
        - last_seen
        - active
        - is_stale
      properties:
        id:
          type: string
          format: uuid
        hostname:
          type: string
        agent_role:
          $ref: '#/components/schemas/AgentRole'
        agent_url:
          type: string
          format: uri
          nullable: true
        capabilities:
          type: array
          items:
            type: string
        os_distribution:
          type: string
          nullable: true
        registered_at:
          type: string
          format: date-time
        token_rotated_at:
          type: string
          format: date-time
        last_seen:
          type: string
          format: date-time
        active:
          type: boolean
        is_stale:
          type: boolean

